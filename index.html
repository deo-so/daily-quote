<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', sans-serif;
      padding: 32px;
      background: transparent;
      display: flex; flex-direction: column;
      justify-content: center;
      min-height: 100vh;
    }
    .quote {
      font-size: 1.4em; font-weight: 700;
      line-height: 1.4; color: #000;
    }
    .credits {
      margin-top: 16px; font-size: 0.9em;
      color: #555; line-height: 1.5;
    }
    .credits strong { color: #333; }
    .credits a { color: #555; text-decoration: underline; }
    .credits a:hover { color: #0000dd; }
    .remarks {
      margin-top: 8px; font-size: 0.85em;
      color: #444; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="quote">If the world is upside down, then we don’t adjust to it. We flip it.</div>
  <div class="credits"><strong>—Rev. Randy Lewis</strong>  |  <em><a href="https://blog.revrandylewis.com/upside-down/" target="_blank">Poem “Upside Down” — Feb 2026</a></em></div>
</body>
</html>
